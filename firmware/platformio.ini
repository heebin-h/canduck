[platformio]
default_envs = esp32-s3-devkit

[env:esp32-s3-devkit]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.psram_type = qspi
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library@^3.0.0
    electroniccats/MPU6050@^1.4.0
    adafruit/Adafruit MPR121@^1.1.3
build_flags =
    -DCANDUCK_FW_VERSION=\"0.1.0\"
    -DCANDUCK_UART_BAUD=115200
    -DCANDUCK_DEBUG=1
